<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Informasi Gudang</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#f1f5f9;
}

/* LOGIN */
#login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#2563eb,#60a5fa);
}

.login-box{
width:350px;
background:white;
padding:30px;
border-radius:10px;
}

.login-box input{
width:100%;
padding:10px;
margin:8px 0;
}

button{
width:100%;
padding:10px;
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

/* DASHBOARD */
#dashboard{
display:none;
padding:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
text-align:center;
}

.card h1{
color:#2563eb;
}

.section{
margin-top:20px;
background:white;
padding:15px;
border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>Login Gudang</h2>

    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">

    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<h2>📊 Dashboard Gudang</h2>

<div class="cards">

  <div class="card">
    <h4>Total Barang</h4>
    <h1 id="dashBarang">0</h1>
  </div>

  <div class="card">
    <h4>Supplier</h4>
    <h1 id="dashSupplier">0</h1>
  </div>

  <div class="card">
    <h4>Barang Masuk</h4>
    <h1 id="dashMasuk">0</h1>
  </div>

  <div class="card">
    <h4>Barang Keluar</h4>
    <h1 id="dashKeluar">0</h1>
  </div>

</div>

<div class="section">
  <h3>📋 Ringkasan Data</h3>

  <p>Total Barang: <span id="tBarang">0</span></p>
  <p>Total Supplier: <span id="tSupplier">0</span></p>
  <p>Total Masuk: <span id="tMasuk">0</span></p>
  <p>Total Keluar: <span id="tKeluar">0</span></p>
</div>

</div>

<script>
// LOGIN
function login(){
let u = document.getElementById("user").value;
let p = document.getElementById("pass").value;

if(u==="admin" && p==="admin123"){
document.getElementById("login").style.display="none";
document.getElementById("dashboard").style.display="block";
updateDashboard();
}else{
alert("Login gagal");
}
}

/* DATA SIMULASI */
let barang = ["Laptop","Printer","Mouse","Keyboard"];
let supplier = ["A","B"];
let barangMasuk = ["1","2"];
let barangKeluar = ["1","2"];

/* UPDATE DASHBOARD */
function updateDashboard(){

document.getElementById("dashBarang").innerText = barang.length;
document.getElementById("dashSupplier").innerText = supplier.length;
document.getElementById("dashMasuk").innerText = barangMasuk.length;
document.getElementById("dashKeluar").innerText = barangKeluar.length;

document.getElementById("tBarang").innerText = barang.length;
document.getElementById("tSupplier").innerText = supplier.length;
document.getElementById("tMasuk").innerText = barangMasuk.length;
document.getElementById("tKeluar").innerText = barangKeluar.length;
}
</script>

</body>
</html>
