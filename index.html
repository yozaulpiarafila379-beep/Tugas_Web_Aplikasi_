<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Gudang</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#f1f5f9;
}

/* LOGIN */
#login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#2563eb,#60a5fa);
}

.login-box{
background:white;
padding:25px;
border-radius:10px;
width:300px;
}

/* SISTEM */
#sistem{
display:none;
}

.page{
display:none;
padding:20px;
}

.active{
display:block;
}

/* DASHBOARD CARD */
.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.card h2{
margin:0;
color:#2563eb;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="login-box">
<h3>Login</h3>
<input id="user" placeholder="Username"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
</div>
</div>

<!-- SISTEM -->
<div id="sistem">

<!-- DASHBOARD -->
<div id="dashboard" class="page active">

<h2>📊 Dashboard Gudang</h2>

<div class="card">
<h4>Total Barang</h4>
<h2 id="dbBarang">0</h2>
</div>

<div class="card">
<h4>Supplier</h4>
<h2 id="dbSupplier">0</h2>
</div>

<div class="card">
<h4>Barang Masuk</h4>
<h2 id="dbMasuk">0</h2>
</div>

<div class="card">
<h4>Barang Keluar</h4>
<h2 id="dbKeluar">0</h2>
</div>

</div>

</div>

<script>

/* LOGIN */
function login(){

let user=document.getElementById("user").value;
let pass=document.getElementById("pass").value;

if(user=="admin" && pass=="admin123"){

document.getElementById("login").style.display="none";
document.getElementById("sistem").style.display="block";

updateDashboard();

}else{
alert("Login salah");
}

}

/* DASHBOARD UPDATE */
function updateDashboard(){

let barang = JSON.parse(localStorage.getItem("barang")) || [];
let supplier = JSON.parse(localStorage.getItem("supplier")) || [];
let masuk = JSON.parse(localStorage.getItem("barangMasuk")) || [];
let keluar = JSON.parse(localStorage.getItem("barangKeluar")) || [];

document.getElementById("dbBarang").innerText = barang.length;
document.getElementById("dbSupplier").innerText = supplier.length;
document.getElementById("dbMasuk").innerText = masuk.length;
document.getElementById("dbKeluar").innerText = keluar.length;

}

</script>

</body>
</html>
