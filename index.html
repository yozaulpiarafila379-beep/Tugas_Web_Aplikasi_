<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Informasi Gudang</title>

<style>
/* ====== (CSS KAMU TETAP, TIDAK DIUBAH) ====== */
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif;}
body{background:#f1f5f9;}
#login{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#2563eb,#60a5fa);}
.login-box{width:380px;background:white;padding:35px;border-radius:15px;box-shadow:0 10px 25px rgba(0,0,0,.15);}
#sistem{display:none;}
.layout{display:flex;}
.sidebar{width:250px;height:100vh;background:#1e3a8a;color:white;position:fixed;left:0;top:0;padding:20px;}
.content{margin-left:250px;width:calc(100% - 250px);}
.header{background:white;padding:18px 25px;}
.container{padding:25px;}
.page{display:none;}
.active{display:block;}
.section{background:white;padding:20px;border-radius:12px;margin-bottom:20px;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;}
.card{background:white;padding:20px;border-radius:12px;}
</style>
</head>

<body>

<!-- LOGIN (TIDAK DIUBAH) -->
<div id="login">
<div class="login-box">
<h2>Login</h2>
<input id="user">
<input id="pass" type="password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- SISTEM -->
<div id="sistem">
<div class="layout">

<!-- SIDEBAR (TIDAK DIUBAH) -->
<div class="sidebar">
<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('barang')">Data Barang</button>
<button onclick="showPage('supplier')">Supplier</button>
<button onclick="showPage('masuk')">Barang Masuk</button>
<button onclick="showPage('keluar')">Barang Keluar</button>
<button onclick="showPage('laporan')">Laporan</button>
<button onclick="showPage('profil')">Profil</button>
</div>

<!-- CONTENT -->
<div class="content">

<div class="header">
<h2>Dashboard Gudang</h2>
</div>

<div class="container">

<!-- ================= DASHBOARD UBAH TOTAL ================= -->
<div id="dashboard" class="page active">

<div class="section">
<h3>➕ Tambah Card Dashboard (Manual)</h3>

<input id="judulCard" placeholder="Judul">
<input id="angkaCard" placeholder="Angka">

<button onclick="tambahCard()">
Tambah
</button>
</div>

<!-- CARD STATISTIK -->
<div class="cards" id="cardsDashboard">

<div class="card">
<h4>Total Barang</h4>
<h1 id="totalBarang">0</h1>
</div>

<div class="card">
<h4>Total Supplier</h4>
<h1 id="totalSupplier">0</h1>
</div>

<div class="card">
<h4>Barang Masuk</h4>
<h1 id="totalMasuk">0</h1>
</div>

<div class="card">
<h4>Barang Keluar</h4>
<h1 id="totalKeluar">0</h1>
</div>

</div>

<!-- CUSTOM CARD AREA -->
<div class="cards" id="customCards"></div>

<!-- GRAFIK -->
<div class="section">
<h3>Grafik Stok</h3>
<canvas id="stokChart"></canvas>
</div>

</div>

</div>
</div>
</div>

<script>
function login(){
document.getElementById("login").style.display="none";
document.getElementById("sistem").style.display="block";
updateDashboard();
}

/* ================= DASHBOARD UPDATE ================= */
function updateDashboard(){

let barang = JSON.parse(localStorage.getItem("barang")) || [];
let supplier = JSON.parse(localStorage.getItem("supplier")) || [];
let masuk = JSON.parse(localStorage.getItem("barangMasuk")) || [];
let keluar = JSON.parse(localStorage.getItem("barangKeluar")) || [];

document.getElementById("totalBarang").innerText = barang.length;
document.getElementById("totalSupplier").innerText = supplier.length;
document.getElementById("totalMasuk").innerText = masuk.length;
document.getElementById("totalKeluar").innerText = keluar.length;

/* grafik update */
renderChart(masuk.length, keluar.length);

/* custom card */
renderCustomCard();
}

/* ================= CUSTOM CARD ================= */
function tambahCard(){

let judul = document.getElementById("judulCard").value;
let angka = document.getElementById("angkaCard").value;

if(judul=="" || angka=="") return alert("Isi lengkap");

let data = JSON.parse(localStorage.getItem("customCard")) || [];

data.push({judul,angka});

localStorage.setItem("customCard",JSON.stringify(data));

renderCustomCard();
}

function renderCustomCard(){

let data = JSON.parse(localStorage.getItem("customCard")) || [];
let box = document.getElementById("customCards");

box.innerHTML="";

data.forEach((d)=>{

box.innerHTML += `
<div class="card">
<h4>${d.judul}</h4>
<h1>${d.angka}</h1>
</div>
`;

});
}

/* ================= CHART ================= */
let chart;

function renderChart(masuk,keluar){

if(chart) chart.destroy();

chart = new Chart(document.getElementById("stokChart"),{
type:"bar",
data:{
labels:["Masuk","Keluar"],
datasets:[{
label:"Transaksi",
data:[masuk,keluar]
}]
}
});

}

/* ================= PAGE ================= */
function showPage(id){
let pages=document.getElementsByClassName("page");
for(let i=0;i<pages.length;i++){
pages[i].classList.remove("active");
}
document.getElementById(id).classList.add("active");

if(id=="dashboard") updateDashboard();
}
</script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
