<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pendataan Barang di Gudang</title>
    <style>
        :root {
            --primary: #1a237e;
            --primary-light: #3949ab;
            --accent: #00acc1;
            --success: #2e7d32;
            --danger: #c62828;
            --warning: #ef6c00;
            --bg: #f4f6f9;
            --sidebar-bg: #0d1b2a;
            --card-bg: #ffffff;
            --text: #212121;
            --text-light: #616161;
            --border: #e0e0e0;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            --radius: 10px;
            --transition: 0.25s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ========== LOGIN OVERLAY ========== */
        .login-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0d1b2a 0%, #1a237e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            transition: opacity 0.4s ease;
        }
        .login-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .login-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 40px 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .login-card h2 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 4px;
        }
        .login-card p {
            color: #607d8b;
            font-size: 0.88rem;
            margin-bottom: 24px;
        }
        .login-card .form-group {
            text-align: left;
            margin-bottom: 18px;
        }
        .login-card label {
            display: block;
            font-weight: 600;
            font-size: 0.82rem;
            margin-bottom: 5px;
            color: #37474f;
            letter-spacing: 0.3px;
        }
        .login-card input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: inherit;
            transition: var(--transition);
            outline: none;
            background: #fafbfc;
        }
        .login-card input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 172, 193, 0.1);
            background: #fff;
        }
        .login-card .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--primary-light);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 8px;
        }
        .login-card .btn-login:hover {
            background: var(--primary);
            box-shadow: 0 4px 14px rgba(26, 35, 126, 0.35);
        }
        .login-error {
            color: #c62828;
            font-size: 0.82rem;
            margin-top: 10px;
            min-height: 20px;
            font-weight: 500;
        }
        .login-cred {
            font-size: 0.75rem;
            color: #78909c;
            margin-top: 18px;
            background: #f5f7fa;
            padding: 8px 12px;
            border-radius: 6px;
        }

        /* ========== APP CONTAINER ========== */
        #app-container {
            display: none;
        }
        #app-container.visible {
            display: flex;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            width: 260px;
            min-width: 260px;
            background: var(--sidebar-bg);
            color: #ecf0f1;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            box-shadow: 3px 0 20px rgba(0, 0, 0, 0.2);
        }
        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .sidebar-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #ffffff;
        }
        .sidebar-header span {
            font-size: 0.75rem;
            color: #90a4ae;
            display: block;
            margin-top: 2px;
        }
        .sidebar-nav {
            flex: 1;
            padding: 12px 0;
            overflow-y: auto;
        }
        .sidebar-nav .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 13px 20px;
            cursor: pointer;
            transition: var(--transition);
            color: #b0bec5;
            font-size: 0.92rem;
            font-weight: 500;
            border-left: 3px solid transparent;
            text-decoration: none;
            margin: 2px 0;
        }
        .sidebar-nav .nav-item:hover {
            background: rgba(255, 255, 255, 0.04);
            color: #ffffff;
        }
        .sidebar-nav .nav-item.active {
            background: rgba(255, 255, 255, 0.07);
            color: #ffffff;
            border-left-color: var(--accent);
            font-weight: 600;
        }
        .nav-icon {
            width: 20px;
            text-align: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        .sidebar-footer {
            padding: 14px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 0.7rem;
            color: #607d8b;
            text-align: center;
        }
        .btn-logout {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #b0bec5;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.7rem;
            margin-top: 6px;
            transition: var(--transition);
        }
        .btn-logout:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        /* ========== MAIN CONTENT ========== */
        .main-content {
            margin-left: 260px;
            flex: 1;
            padding: 28px 32px;
            overflow-y: auto;
            min-height: 100vh;
        }
        .page {
            display: none;
        }
        .page.active {
            display: block;
            animation: fadeSlide 0.4s ease;
        }
        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .page-header {
            margin-bottom: 24px;
        }
        .page-header h1 {
            font-size: 1.7rem;
            font-weight: 700;
            color: #1a1a2e;
            letter-spacing: -0.3px;
        }
        .page-header p {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-top: 2px;
        }

        /* ========== CARDS ========== */
        .card-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
            margin-bottom: 26px;
        }
        .stat-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px 22px;
            box-shadow: var(--shadow);
            border-left: 4px solid transparent;
            transition: var(--transition);
        }
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
        }
        .stat-card.blue {
            border-left-color: var(--primary-light);
        }
        .stat-card.green {
            border-left-color: var(--success);
        }
        .stat-card.orange {
            border-left-color: var(--warning);
        }
        .stat-card.red {
            border-left-color: var(--danger);
        }
        .stat-card .stat-label {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-light);
            margin-bottom: 6px;
            font-weight: 600;
        }
        .stat-card .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #1a1a2e;
        }
        .stat-card .stat-sub {
            font-size: 0.78rem;
            color: var(--text-light);
            margin-top: 4px;
        }

        /* ========== ANGGOTA CARD ========== */
        .anggota-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: var(--transition);
            border: 1px solid #f0f0f0;
        }
        .anggota-card:hover {
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-color: var(--accent);
        }
        .anggota-card .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--primary-light);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 14px;
        }
        .anggota-card h3 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 4px;
        }
        .anggota-card .nim {
            font-size: 0.9rem;
            color: var(--text-light);
            font-family: monospace;
            letter-spacing: 0.5px;
        }
        .anggota-card .role {
            font-size: 0.78rem;
            color: #78909c;
            margin-top: 6px;
        }

        /* ========== TABLE ========== */
        .table-container {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .table-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            align-items: center;
            justify-content: space-between;
        }
        .table-toolbar input {
            padding: 9px 14px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-size: 0.88rem;
            min-width: 240px;
            transition: var(--transition);
            outline: none;
        }
        .table-toolbar input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 172, 193, 0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        table thead th {
            background: #f9fafb;
            padding: 12px 16px;
            text-align: left;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--text-light);
            font-weight: 700;
            border-bottom: 2px solid var(--border);
        }
        table tbody td {
            padding: 12px 16px;
            font-size: 0.9rem;
            border-bottom: 1px solid #f0f0f0;
        }
        table tbody tr:hover {
            background: #f8fafc;
        }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.74rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .badge-in {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .badge-out {
            background: #ffebee;
            color: #c62828;
        }
        .stok-rendah {
            color: #c62828;
            font-weight: 700;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .text-center { text-align: center; }
        .text-muted { color: #9e9e9e; font-style: italic; }

        /* ========== BUTTONS ========== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: var(--transition);
            text-decoration: none;
        }
        .btn-primary { background: var(--primary-light); color: #fff; }
        .btn-primary:hover { background: var(--primary); box-shadow: 0 4px 12px rgba(26, 35, 126, 0.3); }
        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover { background: #1b5e20; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { background: #b71c1c; }
        .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
        .btn-outline:hover { background: #f5f5f5; border-color: #bdbdbd; }
        .btn-sm { padding: 5px 10px; font-size: 0.75rem; border-radius: 4px; }

        /* ========== FORMS ========== */
        .form-container {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px 28px;
            max-width: 600px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 5px;
            color: #37474f;
            letter-spacing: 0.3px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-size: 0.9rem;
            font-family: inherit;
            transition: var(--transition);
            outline: none;
            background: #fafbfc;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 172, 193, 0.08);
            background: #fff;
        }
        .form-row {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }
        .form-row .form-group {
            flex: 1;
            min-width: 160px;
        }
        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .alert-success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .alert-error { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }

        /* ========== MODAL ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal {
            background: #fff;
            border-radius: var(--radius);
            padding: 24px 28px;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
        }
        .modal h3 { margin-bottom: 8px; font-size: 1.2rem; }
        .modal p { color: var(--text-light); font-size: 0.88rem; margin-bottom: 18px; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

        .hidden { display: none !important; }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .sidebar { width: 60px; min-width: 60px; }
            .sidebar-header h2, .sidebar-header span, .sidebar-nav .nav-item span:not(.nav-icon) { display: none; }
            .sidebar-nav .nav-item { justify-content: center; padding: 14px 0; }
            .main-content { margin-left: 60px; padding: 16px; }
            .card-row { grid-template-columns: 1fr 1fr; }
            .form-row { flex-direction: column; }
            table { font-size: 0.75rem; }
            table thead th, table tbody td { padding: 8px 6px; }
            .login-card { margin: 16px; padding: 28px 20px; }
            .anggota-card { padding: 16px; }
        }
    </style>
</head>
<body>
    <!-- ==================== LOGIN OVERLAY ==================== -->
    <div id="login-overlay" class="login-overlay">
        <div class="login-card">
            <h2>GudangApp</h2>
            <p>Silakan login untuk mengakses sistem</p>
            <form id="form-login">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Masukkan username" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Masukkan password" required>
                </div>
                <div class="login-error" id="login-error"></div>
                <button type="submit" class="btn-login">Masuk ke Sistem</button>
            </form>
            <div class="login-cred" id="login-cred-info">
                Gunakan: <strong>admin</strong> / <strong>admin123</strong>
            </div>
        </div>
    </div>

                <span>Sistem Pendataan Barang</span>

                    <span class="nav-icon">&#9709;</span> Riwayat Transaksi
                </div>
                <div class="nav-item" data-page="profil">
                    <span class="nav-icon">&#9679;</span> Profil Admin
                </div>
